<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АБЖ Тестілеу Жүйесі</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px; padding: 40px;
            width: 100%; max-width: 700px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        h1 {
            text-align: center; margin-bottom: 30px; font-size: 1.8em;
            background: linear-gradient(45deg, #f3a183, #e0c3fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        h2 { margin-bottom: 20px; color: #e0c3fc; font-size: 1.3em; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #ddd; }
        input, select {
            width: 100%; padding: 14px 18px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
            color: #fff; font-size: 1em; outline: none;
            transition: all 0.3s; font-family: inherit;
        }
        input:focus, select:focus {
            border-color: #f3a183; box-shadow: 0 0 15px rgba(243,161,131,0.3);
            background: rgba(255,255,255,0.15);
        }
        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            font-size: 1.1em; font-weight: 600; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
            font-family: inherit;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: #fff; box-shadow: 0 8px 20px rgba(76,175,80,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(76,175,80,0.5); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .test-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; flex-wrap: wrap; gap: 10px;
        }
        .timer {
            background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 30px;
            font-size: 1.2em; font-weight: bold; color: #f3a183;
            border: 2px solid #f3a183; min-width: 100px; text-align: center;
        }
        .timer.warning { color: #ff6b6b; border-color: #ff6b6b; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .question-timer {
            background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px;
            font-size: 1em; font-weight: bold; color: #f3a183;
            border: 2px solid #f3a183; min-width: 80px; text-align: center;
        }
        .progress { color: #ccc; font-size: 0.95em; }
        .question-block {
            background: rgba(255,255,255,0.05); border-radius: 15px;
            padding: 25px; margin-bottom: 20px; border-left: 4px solid #f3a183;
        }
        .question-text { font-size: 1.15em; margin-bottom: 20px; line-height: 1.6; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            text-align: left; padding: 15px 20px;
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px; color: #ddd; cursor: pointer;
            transition: all 0.25s; font-size: 1em; width: 100%;
        }
        .option-btn:hover { background: rgba(255,255,255,0.15); border-color: #f3a183; transform: translateX(5px); }
        .result-box { text-align: center; padding: 30px; }
        .result-score {
            font-size: 4em; font-weight: bold;
            background: linear-gradient(45deg, #f3a183, #e0c3fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        .error { color: #ff6b6b; text-align: center; margin-top: 10px; }
        .hidden { display: none !important; }
        .difficulty-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.75em; font-weight: 600; margin-left: 10px; text-transform: uppercase;
        }
        .badge-easy { background: #4caf50; color: #fff; }
        .badge-medium { background: #ff9800; color: #fff; }
        .badge-hard { background: #f44336; color: #fff; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- Регистрация -->
        <div id="registerScreen">
            <h1>📚 АБЖ Тестілеу</h1>
            <div class="form-group">
                <label for="fullName">Толық аты-жөніңіз (ФИО):</label>
                <input type="text" id="fullName" placeholder="Мысалы: Ахметов Асқар Маратұлы">
            </div>
            <div class="form-group">
                <label for="groupSelect">Топты таңдаңыз:</label>
                <select id="groupSelect">
                    <option value="">-- Топты таңдаңыз --</option>
                    <option value="24-01а">24-01а</option>
                    <option value="24-01б">24-01б</option>
                    <option value="24-02а">24-02а</option>
                    <option value="24-02б">24-02б</option>
                    <option value="24-03а">24-03а</option>
                    <option value="24-03б">24-03б</option>
                    <option value="24-04б">24-04б</option>
                    <option value="24-05а">24-05а</option>
                    <option value="24-05б">24-05б</option>
                    <option value="24-06а">24-06а</option>
                    <option value="24-07а">24-07а</option>
                    <option value="24-07б">24-07б</option>
                </select>
            </div>
            <p style="font-size:0.9em; color:#ccc; text-align:center;">
                ⚠️ 25 сұрақ, 40 минут. Әр сұраққа <strong>1 минут 6 секунд</strong>.<br>
                Тек бір әрекет! Шығып кетсеңіз тест жабылады.
            </p>
            <button class="btn btn-primary" id="startBtn" onclick="startTest()">ТЕСТТІ БАСТАУ</button>
            <p id="registerError" class="error"></p>
        </div>

        <!-- Тест -->
        <div id="testScreen" class="hidden">
            <div class="test-header">
                <span class="progress" id="questionProgress">1 / 25</span>
                <span class="question-timer" id="questionTimer">1:06</span>
                <span class="timer" id="timerDisplay">40:00</span>
            </div>
            <div class="question-block">
                <div class="question-text" id="questionText"></div>
                <span class="difficulty-badge" id="difficultyBadge"></span>
            </div>
            <div class="options" id="optionsContainer"></div>
            <p id="testError" class="error"></p>
        </div>

        <!-- Результаты -->
        <div id="resultScreen" class="hidden">
            <div class="result-box">
                <h2>🎯 Тест аяқталды!</h2>
                <p style="font-size:1.1em;" id="resultName"></p>
                <p style="color:#ccc;" id="resultGroup"></p>
                <div class="result-score" id="resultScore"></div>
                <p style="color:#ccc;" id="resultDetails"></p>
                <p style="margin-top:20px; color:#aaa;">Нәтиже Google Кестеге сақталды.</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== КОНФИГУРАЦИЯ ====================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbKc75NeC0tG1nuwHhjZLTPltsaMzLYt55Rg24a38PTp1Z3eWYT_wM7W_gJ_2BJDPT/exec'; // ← замените
        const QUESTION_TIME = 66; // секунд на вопрос
        const TEST_DURATION = 40 * 60; // общий лимит

        // База вопросов (60)
        const QUESTION_BANK = [
            // ... (вставьте массив из предыдущего ответа, он остается без изменений)
        ];

        // ==================== ПЕРЕМЕННЫЕ ====================
        let studentData = null;
        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let answers = new Array(25).fill(-1);
        let testActive = false, testFinished = false;
        let globalTimerInterval = null, questionTimerInterval = null;
        let timeRemaining = TEST_DURATION;
        let questionTimeLeft = QUESTION_TIME;
        let userIP = '';

        // ==================== ФУНКЦИИ ====================
        function shuffleArray(arr) { /* как раньше */ }

        function selectQuestions() { /* как раньше */ }

        // Запуск после проверки
        async function startTest() {
            const fullName = document.getElementById('fullName').value.trim();
            const group = document.getElementById('groupSelect').value;
            const errEl = document.getElementById('registerError');
            errEl.textContent = '';

            if (!fullName || !group) {
                errEl.textContent = '❗ Толық аты-жөніңізді және топты енгізіңіз!';
                return;
            }

            // Получаем IP
            try {
                const ipResp = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResp.json();
                userIP = ipData.ip;
            } catch (e) {
                userIP = 'unknown';
            }

            // Проверка через Google Sheets
            const checkUrl = `${GOOGLE_SCRIPT_URL}?action=check&fullName=${encodeURIComponent(fullName)}&group=${encodeURIComponent(group)}&ip=${userIP}`;
            try {
                const resp = await fetch(checkUrl);
                const text = await resp.text();
                if (text === 'ALREADY_COMPLETED') {
                    errEl.textContent = '⛔ Сіз бұл тестті бұрын аяқтағансыз немесе сіздің IP-ден тест тапсырылған. Қайта тапсыру мүмкін емес.';
                    return;
                } else if (text === 'GROUP_NOT_FOUND') {
                    errEl.textContent = 'Группа не найдена.';
                    return;
                }
            } catch (e) {
                errEl.textContent = '⚠️ Сервермен байланыс орнату мүмкін болмады.';
                return;
            }

            studentData = { fullName, group };
            selectedQuestions = selectQuestions();
            currentQuestionIndex = 0;
            answers = new Array(25).fill(-1);
            testActive = true;
            testFinished = false;
            timeRemaining = TEST_DURATION;

            document.getElementById('registerScreen').classList.add('hidden');
            document.getElementById('testScreen').classList.remove('hidden');
            document.getElementById('resultScreen').classList.add('hidden');

            showQuestion();
            startGlobalTimer();
            startQuestionTimer();

            document.addEventListener('visibilitychange', handleVisibilityChange);
            window.addEventListener('blur', handleWindowBlur);
        }

        function showQuestion() {
            if (!testActive || testFinished) return;
            if (currentQuestionIndex >= selectedQuestions.length) { finishTest(); return; }

            const q = selectedQuestions[currentQuestionIndex];
            document.getElementById('questionProgress').textContent = `${currentQuestionIndex+1} / 25`;

            let badge = '';
            if (q.diff === 1) badge = '<span class="badge badge-easy">Жеңіл</span>';
            else if (q.diff === 2) badge = '<span class="badge badge-medium">Орташа</span>';
            else badge = '<span class="badge badge-hard">Күрделі</span>';

            document.getElementById('questionText').innerHTML = `${currentQuestionIndex+1}. ${q.q}`;
            document.getElementById('difficultyBadge').innerHTML = badge;

            const optsContainer = document.getElementById('optionsContainer');
            optsContainer.innerHTML = '';
            const letters = ['A','B','C','D'];
            q.opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = `${letters[idx]}) ${opt}`;
                btn.addEventListener('click', () => selectAnswer(idx));
                optsContainer.appendChild(btn);
            });

            resetQuestionTimer();
            document.getElementById('testError').textContent = '';
        }

        function selectAnswer(optionIndex) {
            if (!testActive || testFinished) return;
            answers[currentQuestionIndex] = optionIndex;
            currentQuestionIndex++;
            if (currentQuestionIndex >= selectedQuestions.length) finishTest();
            else showQuestion();
        }

        // Таймеры
        function startGlobalTimer() {
            updateGlobalTimerDisplay();
            globalTimerInterval = setInterval(() => {
                timeRemaining--;
                updateGlobalTimerDisplay();
                if (timeRemaining <= 0) finishTest();
            }, 1000);
        }
        function updateGlobalTimerDisplay() {
            const m = Math.floor(timeRemaining/60), s = timeRemaining%60;
            const el = document.getElementById('timerDisplay');
            el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (timeRemaining < 300) el.classList.add('warning');
            else el.classList.remove('warning');
        }

        function startQuestionTimer() { resetQuestionTimer(); }
        function resetQuestionTimer() {
            clearInterval(questionTimerInterval);
            questionTimeLeft = QUESTION_TIME;
            updateQuestionTimerDisplay();
            questionTimerInterval = setInterval(() => {
                questionTimeLeft--;
                updateQuestionTimerDisplay();
                if (questionTimeLeft <= 0) {
                    clearInterval(questionTimerInterval);
                    selectAnswer(-1); // пропуск вопроса
                }
            }, 1000);
        }
        function updateQuestionTimerDisplay() {
            const m = Math.floor(questionTimeLeft/60), s = questionTimeLeft%60;
            document.getElementById('questionTimer').textContent = `${m}:${String(s).padStart(2,'0')}`;
        }

        function handleVisibilityChange() {
            if (document.hidden && testActive && !testFinished) forceTerminate('Терезе жабылды немесе ауыстырылды.');
        }
        function handleWindowBlur() {
            if (testActive && !testFinished && document.hasFocus && !document.hasFocus()) {
                setTimeout(() => {
                    if (testActive && !testFinished && document.hasFocus && !document.hasFocus())
                        forceTerminate('Терезе белсенді емес.');
                }, 2000);
            }
        }
        function forceTerminate(reason) {
            if (!testActive || testFinished) return;
            testActive = false; testFinished = true;
            clearInterval(globalTimerInterval);
            clearInterval(questionTimerInterval);
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            window.removeEventListener('blur', handleWindowBlur);
            sendResult('TERMINATED', reason);
            showResultScreen(0,0,true, reason);
        }

        function finishTest() {
            if (!testActive || testFinished) return;
            testActive = false; testFinished = true;
            clearInterval(globalTimerInterval);
            clearInterval(questionTimerInterval);
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            window.removeEventListener('blur', handleWindowBlur);
            let correct = 0;
            for (let i=0; i<selectedQuestions.length; i++)
                if (answers[i] === selectedQuestions[i].ans) correct++;
            sendResult('COMPLETED', `${correct}/${selectedQuestions.length}`);
            showResultScreen(correct, selectedQuestions.length);
        }

        function sendResult(status, details) {
            if (!studentData || GOOGLE_SCRIPT_URL.includes('ВАШ_НОВЫЙ_ID')) return;
            const answersStr = selectedQuestions.map((q,i) =>
                `Q${q.id}:${answers[i]??'-'}(${answers[i]===q.ans?'✓':'✗'})`
            ).join(';');
            const formData = new URLSearchParams();
            formData.append('fullName', studentData.fullName);
            formData.append('group', studentData.group);
            formData.append('status', status);
            formData.append('score', details);
            formData.append('timestamp', new Date().toLocaleString('kk-KZ'));
            formData.append('ip', userIP);
            formData.append('answersStr', answersStr);

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            }).catch(e => console.error(e));
        }

        function showResultScreen(correct, total, terminated=false, reason='') {
            document.getElementById('testScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('resultName').textContent = studentData?.fullName || '—';
            document.getElementById('resultGroup').textContent = studentData?.group || '—';
            if (terminated) {
                document.getElementById('resultScore').textContent = '🚫';
                document.getElementById('resultDetails').textContent = reason || 'Тест мерзімінен бұрын аяқталды.';
            } else {
                const percent = total>0 ? Math.round((correct/total)*100) : 0;
                document.getElementById('resultScore').textContent = `${correct}/${total}`;
                document.getElementById('resultDetails').textContent = `Пайыз: ${percent}%`;
            }
        }

        // Запрет обновления/назад
        window.addEventListener('beforeunload', e => {
            if (testActive && !testFinished) e.preventDefault();
        });
        window.addEventListener('popstate', e => {
            if (testActive && !testFinished) {
                history.pushState(null, document.title, location.href);
                alert('Артқа қайтуға болмайды!');
            }
        });
        history.pushState(null, document.title, location.href);

        window.addEventListener('load', () => {
            document.getElementById('registerScreen').classList.remove('hidden');
            document.getElementById('testScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            testActive = false; testFinished = false;
        });
    </script>
</body>
</html>
