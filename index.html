        }
        function updateGlobalTimerDisplay() {
            const m = Math.floor(timeRemaining/60), s = timeRemaining%60;
            const el = document.getElementById('timerDisplay');
            el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (timeRemaining < 300) el.classList.add('warning');
            else el.classList.remove('warning');
        }

        function startQuestionTimer() { resetQuestionTimer(); }
        function resetQuestionTimer() {
            clearInterval(questionTimerInterval);
            questionTimeLeft = QUESTION_TIME;
            updateQuestionTimerDisplay();
            questionTimerInterval = setInterval(() => {
                questionTimeLeft--;
                updateQuestionTimerDisplay();
                if (questionTimeLeft <= 0) {
                    clearInterval(questionTimerInterval);
                    selectAnswer(-1); // пропуск вопроса
                }
            }, 1000);
        }
        function updateQuestionTimerDisplay() {
            const m = Math.floor(questionTimeLeft/60), s = questionTimeLeft%60;
            document.getElementById('questionTimer').textContent = `${m}:${String(s).padStart(2,'0')}`;
        }

        function handleVisibilityChange() {
            if (document.hidden && testActive && !testFinished) forceTerminate('Терезе жабылды немесе ауыстырылды.');
        }
        function handleWindowBlur() {
            if (testActive && !testFinished && document.hasFocus && !document.hasFocus()) {
                setTimeout(() => {
                    if (testActive && !testFinished && document.hasFocus && !document.hasFocus())
                        forceTerminate('Терезе белсенді емес.');
                }, 2000);
            }
        }
        function forceTerminate(reason) {
            if (!testActive || testFinished) return;
            testActive = false; testFinished = true;
            clearInterval(globalTimerInterval);
            clearInterval(questionTimerInterval);
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            window.removeEventListener('blur', handleWindowBlur);
            sendResult('TERMINATED', reason);
            showResultScreen(0,0,true, reason);
        }

        function finishTest() {
            if (!testActive || testFinished) return;
            testActive = false; testFinished = true;
            clearInterval(globalTimerInterval);
            clearInterval(questionTimerInterval);
            document.removeEventListener('visibilitychange', handleVisibilityChange);
            window.removeEventListener('blur', handleWindowBlur);
            let correct = 0;
            for (let i=0; i<selectedQuestions.length; i++)
                if (answers[i] === selectedQuestions[i].ans) correct++;
            sendResult('COMPLETED', `${correct}/${selectedQuestions.length}`);
            showResultScreen(correct, selectedQuestions.length);
        }

        function sendResult(status, details) {
            if (!studentData || GOOGLE_SCRIPT_URL.includes('ВАШ_НОВЫЙ_ID')) return;
            const answersStr = selectedQuestions.map((q,i) =>
                `Q${q.id}:${answers[i]??'-'}(${answers[i]===q.ans?'✓':'✗'})`
            ).join(';');
            const formData = new URLSearchParams();
            formData.append('fullName', studentData.fullName);
            formData.append('group', studentData.group);
            formData.append('status', status);
            formData.append('score', details);
            formData.append('timestamp', new Date().toLocaleString('kk-KZ'));
            formData.append('ip', userIP);
            formData.append('answersStr', answersStr);

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            }).catch(e => console.error(e));
        }

        function showResultScreen(correct, total, terminated=false, reason='') {
            document.getElementById('testScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            document.getElementById('resultName').textContent = studentData?.fullName || '—';
            document.getElementById('resultGroup').textContent = studentData?.group || '—';
            if (terminated) {
                document.getElementById('resultScore').textContent = '🚫';
                document.getElementById('resultDetails').textContent = reason || 'Тест мерзімінен бұрын аяқталды.';
            } else {
                const percent = total>0 ? Math.round((correct/total)*100) : 0;
                document.getElementById('resultScore').textContent = `${correct}/${total}`;
                document.getElementById('resultDetails').textContent = `Пайыз: ${percent}%`;
            }
        }

        // Запрет обновления/назад
        window.addEventListener('beforeunload', e => {
            if (testActive && !testFinished) e.preventDefault();
        });
        window.addEventListener('popstate', e => {
            if (testActive && !testFinished) {
                history.pushState(null, document.title, location.href);
                alert('⛔ Тест кезінде артқа қайтуға болмайды!');
            }
        });
        history.pushState(null, document.title, location.href);

        window.addEventListener('load', () => {
            document.getElementById('registerScreen').classList.remove('hidden');
            document.getElementById('testScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            testActive = false; testFinished = false;
        });
    </script>
</body>
</html>
